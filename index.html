<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Docente — Studio Marini</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <div id="loadingOverlay">
        <div class="loader"></div>
        <p style="margin-top: 20px; font-weight: 600; color: var(--g-blue); font-family: 'Poppins';">Caricamento Dashboard...</p>
    </div>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <header class="dashboard-header">
        <div class="logo">
            <div class="logo-icon">M</div>
            <span>STUDIO MARINI <strong>Dashboard</strong></span>
        </div>
        <div class="header-controls">
            <button class="btn btn-timer" onclick="toggleTimer()" id="timerBtn">
                <i class="fas fa-play"></i> <span id="timerDisplay">00:00:00</span>
            </button>
            <button class="btn btn-presenter" onclick="togglePresenterMode()">
                <i class="fas fa-chalkboard-teacher"></i> Presenter
            </button>
            <button class="btn btn-present" onclick="startPresentation()">
                <i class="fas fa-tv"></i> Presentazione
            </button>
            <button class="btn btn-blue" onclick="openModal('partecipanti')">
                <i class="fas fa-users"></i> Partecipanti
            </button>
            <button class="btn btn-outline" onclick="openModal('valutazione')">
                <i class="fas fa-qrcode"></i> QR Valutazione
            </button>
        </div>
    </header>

    <div class="dashboard-container">
        <nav class="dashboard-nav">
            <div class="nav-section">
                <h3>Seleziona Modulo</h3>
                <button class="nav-item active" onclick="selectModule('base')">
                    <span class="nav-number">1</span>
                    <div class="nav-content">
                        <span class="nav-title">Corso Base</span>
                        <span class="nav-subtitle">L'Ufficio Automatico (4h)</span>
                    </div>
                </button>
                <button class="nav-item" onclick="selectModule('mod1')">
                    <span class="nav-number">2</span>
                    <div class="nav-content">
                        <span class="nav-title">Modulo 1</span>
                        <span class="nav-subtitle">Booking & Pagamenti (2h)</span>
                    </div>
                </button>
                <button class="nav-item" onclick="selectModule('mod2')">
                    <span class="nav-number">3</span>
                    <div class="nav-content">
                        <span class="nav-title">Modulo 2</span>
                        <span class="nav-subtitle">Segreteria AI (2h)</span>
                    </div>
                </button>
                <button class="nav-item" onclick="selectModule('mod3')">
                    <span class="nav-number">4</span>
                    <div class="nav-content">
                        <span class="nav-title">Modulo 3</span>
                        <span class="nav-subtitle">Fabbrica Documenti (2h)</span>
                    </div>
                </button>
                <button class="nav-item add-module" onclick="openModal('moduli')">
                    <i class="fas fa-plus-circle"></i>
                    <span>Gestisci Moduli</span>
                </button>
            </div>
            
            <div class="nav-section">
                <h3>Strumenti</h3>
                <button class="nav-item" onclick="openTool('ai-text')">
                    <i class="fas fa-robot"></i>
                    <span>AI Text Studio</span>
                </button>
                <button class="nav-item" onclick="openTool('ai-image')">
                    <i class="fas fa-image"></i>
                    <span>AI Image Studio</span>
                </button>
                <button class="nav-item" onclick="openTool('prompts')">
                    <i class="fas fa-copy"></i>
                    <span>Prompt Library</span>
                </button>
                <button class="nav-item" onclick="openTool('risorse')">
                    <i class="fas fa-folder"></i>
                    <span>Risorse</span>
                </button>
                <button class="nav-item" onclick="openTool('downloads')">
                    <i class="fas fa-download"></i>
                    <span>Download Materiali</span>
                </button>
            </div>
        </nav>

        <main class="dashboard-main">
            <div id="module-view" class="module-view">
                <!-- Module content loaded here -->
            </div>
        </main>
    </div>

    <!-- Modal for Participants -->
    <div id="modal-partecipanti" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-users"></i> Lista Partecipanti</h2>
                <button class="close-modal" onclick="closeModal('partecipanti')">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="new-participant" placeholder="Nome partecipante..." onkeypress="addParticipant(event)">
                <div id="participants-list"></div>
            </div>
        </div>
    </div>

    <!-- Modal for QR Code -->
    <div id="modal-valutazione" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-qrcode"></i> QR Code Valutazione</h2>
                <button class="close-modal" onclick="closeModal('valutazione')">&times;</button>
            </div>
            <div class="modal-body" style="text-align: center;">
                <div id="qr-placeholder" style="background:#eee; width:200px; height:200px; margin:20px auto; display:flex; align-items:center; justify-content:center;">
                    QR Code
                </div>
                <p>Inserisci l'URL del questionario:</p>
                <input type="text" id="qr-url" placeholder="https://..." style="width:100%; padding:10px;">
                <button class="btn btn-blue" style="margin-top:10px;" onclick="generateQR()">Genera QR</button>
            </div>
        </div>
    </div>

    <!-- Modal for Module Management - Full Editor -->
    <div id="modal-moduli" class="modal">
        <div class="modal-content" style="width: 90%; max-width: 1200px; max-height: 90vh;">
            <div class="modal-header">
                <h2><i class="fas fa-cogs"></i> Gestore Moduli Completo</h2>
                <button class="close-modal" onclick="closeModal('moduli')">&times;</button>
            </div>
            <div class="modal-body" style="display: flex; gap: 20px; height: 70vh;">
                <!-- Module List -->
                <div style="width: 250px; border-right: 1px solid var(--border); padding-right: 20px; overflow-y: auto;">
                    <button class="btn btn-green" style="width: 100%; margin-bottom: 15px;" onclick="createNewModule()">
                        <i class="fas fa-plus"></i> Nuovo Modulo
                    </button>
                    <div id="modules-list"></div>
                </div>
                <!-- Module Editor -->
                <div style="flex: 1; overflow-y: auto;">
                    <div id="module-editor">
                        <p style="color: #666; text-align: center; padding: 40px;">Seleziona un modulo per modificare</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { changeSlide, toggleFullscreen, startPresentation, togglePresenterMode, loadChecklist, loadWall } from './js/app.js';

        let currentModule = 'base';
        let timerInterval = null;
        let timerSeconds = 0;
        let timerRunning = false;

        const modulesData = {
            base: {
                title: 'Corso Base: L\'Ufficio Automatico',
                duration: '4 ore',
                sections: [
                    { id: 'b1', title: 'Presentazione: La Posta che si scrive da sola', type: 'presentation', time: 'Ora 1' },
                    { id: 'b1-lab', title: 'Lab: Etichette, Filtri e Gemini in Gmail', type: 'lab' },
                    { id: 'b2', title: 'Presentazione: L\'Agenda che ti fa incassare', type: 'presentation', time: 'Ora 2' },
                    { id: 'b2-lab', title: 'Lab: Booking e Integrazione Stripe', type: 'lab' },
                    { id: 'b3', title: 'Presentazione: Riunioni Smart e Documenti AI', type: 'presentation', time: 'Ora 3' },
                    { id: 'b3-lab', title: 'Lab: Meet trascritto e Docs AI', type: 'lab' },
                    { id: 'b4', title: 'Presentazione: Il Muro di Google e Upselling', type: 'presentation', time: 'Ora 4' }
                ]
            },
            mod1: {
                title: 'Modulo 1: Booking & Pagamenti Digitali',
                duration: '2 ore',
                sections: [
                    { id: 'm1-1', title: 'Presentazione: Architettura dell\'Agenda', type: 'presentation', time: 'Lab 1' },
                    { id: 'm1-1-lab', title: 'Lab: Configura orari, pause e limiti', type: 'lab' },
                    { id: 'm1-2', title: 'Presentazione: Il Listino Servizi', type: 'presentation', time: 'Lab 2' },
                    { id: 'm1-2-lab', title: 'Lab: Crea tipi appuntamento', type: 'lab' },
                    { id: 'm1-3', title: 'Presentazione: Integrazione Stripe', type: 'presentation', time: 'Lab 3' },
                    { id: 'm1-3-lab', title: 'Lab: Collega account Stripe', type: 'lab' },
                    { id: 'm1-4', title: 'Presentazione: Distribuzione Link', type: 'presentation', time: 'Lab 4' }
                ]
            },
            mod2: {
                title: 'Modulo 2: Segreteria AI',
                duration: '2 ore',
                sections: [
                    { id: 'm2-1', title: 'Presentazione: Dominare la Posta', type: 'presentation', time: 'Lab 1' },
                    { id: 'm2-1-lab', title: 'Lab: Prompt Reclamo e Preventivo', type: 'lab' },
                    { id: 'm2-2', title: 'Presentazione: Il Flow della Riunione', type: 'presentation', time: 'Lab 2' },
                    { id: 'm2-2-lab', title: 'Lab: Meet con Trascrizione', type: 'lab' },
                    { id: 'm2-3', title: 'Presentazione: L\'AI che organizza', type: 'presentation', time: 'Lab 3' },
                    { id: 'm2-3-lab', title: 'Lab: Estrai To-Do dalla trascrizione', type: 'lab' }
                ]
            },
            mod3: {
                title: 'Modulo 3: La Fabbrica dei Documenti',
                duration: '2 ore',
                sections: [
                    { id: 'm3-1', title: 'Presentazione: Analisi Documenti', type: 'presentation', time: 'Lab 1' },
                    { id: 'm3-1-lab', title: 'Lab: Estrai da PDF e semplifica', type: 'lab' },
                    { id: 'm3-2', title: 'Presentazione: Generazione Documenti', type: 'presentation', time: 'Lab 2' },
                    { id: 'm3-2-lab', title: 'Lab: Crea manuale operativo', type: 'lab' },
                    { id: 'm3-3', title: 'Presentazione: Dalla Mail al Documento', type: 'presentation', time: 'Lab 3' }
                ]
            }
        };

        window.selectModule = function(moduleId) {
            currentModule = moduleId;
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const activeBtn = document.querySelector('.nav-item[onclick*="' + moduleId + '"]');
            if (activeBtn) activeBtn.classList.add('active');
            renderModule(moduleId);
            syncPresentationSection(0, 'intro', 'Studio Marini', '<p>Benvenuto al corso!</p>', modulesData[moduleId].title);
        };

        function renderModule(moduleId) {
            const module = modulesData[moduleId];
            const container = document.getElementById('module-view');
            
            let html = `
                <div class="module-header">
                    <h1>${module.title}</h1>
                    <span class="badge badge-cloud">${module.duration}</span>
                </div>
                <div class="sections-list">
            `;
            
            module.sections.forEach((section, index) => {
                const icon = section.type === 'presentation' ? 'fa-desktop' : 'fa-flask';
                const badgeClass = section.type === 'presentation' ? 'badge-cloud' : 'badge-ai';
                const badgeText = section.type === 'presentation' ? (section.time || 'Lezione') : 'Laboratorio';
                
                html += `
                    <div class="section-card ${section.type}" onclick="showSection('${section.id}', ${index})">
                        <div class="section-icon">
                            <i class="fas ${icon}"></i>
                        </div>
                        <div class="section-content">
                            <span class="badge ${badgeClass}">${badgeText}</span>
                            <h3>${section.title}</h3>
                        </div>
                        <div class="section-arrow">
                            <i class="fas fa-chevron-right"></i>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }

        window.showSection = function(sectionId, index) {
            const module = modulesData[currentModule];
            const section = module.sections.find(s => s.id === sectionId);
            
            // Use custom content from module data, or fallback to default
            const customContent = section.content || (section.type === 'presentation' ? 
                '<h2>' + (section.title || '').replace('Presentazione: ', '') + '</h2><ul><li>Contenuto della presentazione...</li></ul>' : 
                renderLabContent(sectionId));
            
            const linkHtml = section.link ? `<div style="margin-top:20px;"><a href="${section.link}" target="_blank" class="btn btn-outline"><i class="fas fa-external-link-alt"></i> Apri Risorsa</a></div>` : '';
            
            const container = document.getElementById('module-view');
            container.innerHTML = `
                <div class="section-view">
                    <button class="back-btn" onclick="selectModule('${currentModule}')">
                        <i class="fas fa-arrow-left"></i> Torna al modulo
                    </button>
                    <div class="section-header">
                        <span class="badge ${section.type === 'presentation' ? 'badge-cloud' : 'badge-ai'}">
                            ${section.type === 'presentation' ? 'Presentazione' : 'Laboratorio'}
                        </span>
                        <h1>${section.title}</h1>
                        ${section.time ? `<span style="color:#666; font-size:14px;">${section.time}</span>` : ''}
                    </div>
                    <div class="section-body">
                        ${customContent}
                        ${linkHtml}
                    </div>
                </div>
            `;
            
            // Sync to presentation
            const contentHtml = section.type === 'presentation' ? (section.content || getDynamicContent(currentModule, sectionId)) : customContent;
            syncPresentationSection(index, section.type, section.title, contentHtml, section.time || (section.type === 'presentation' ? 'Lezione' : 'Laboratorio'));
        };

        function renderPresentationContent(sectionId) {
            const contents = {
                'b1': '<h2>La Posta che si scrive da sola</h2><ul><li>Giro di Tavolo: Qual è la attività che ruba più tempo?</li><li>Etichette e Filtri automatici</li><li>Gemini in Gmail: Riassunti e scrittura assistita</li></ul>',
                'b2': '<h2>L\'Agenda che ti fa incassare</h2><ul><li>No-Show: come ridurli con promemoria automatici</li><li>Vetrina Prenotazioni: slot pubblici senza impegni privati</li><li>Stripe: pagamento anticipato automatico</li></ul>',
                'b3': '<h2>Riunioni Smart e Documenti AI</h2><ul><li>Meet con Trascrizione automatica</li><li>Da trascrizione a To-Do list con Gemini</li><li>Generazione documenti con AI</li></ul>',
                'b4': '<h2>Il Muro di Google e Upselling</h2><ul><li>Cosa Google NON può fare</li><li>Presentazione App Studio Marini</li><li>Raccolta lead e questionario</li></ul>',
                'default': '<h2>Contenuto della presentazione</h2><p>Inserisci il contenuto qui...</p>'
            };
            return contents[sectionId] || contents['default'];
        }

function renderLabContent(sectionId) {
            return `
                <div class="lab-content">
                    <h3><i class="fas fa-flask"></i> Istruzioni per il laboratorio:</h3>
                    <ol>
                        <li>Apri il tuo account Google Workspace</li>
                        <li>Segui i passaggi indicati dal docente</li>
                        <li>Testa le funzionalità mostrate</li>
                        <li>Se hai dubbi, chiedi al docente</li>
                    </ol>
                    <div style="margin-top:30px; display:flex; gap:15px;">
                        <button class="btn btn-blue" onclick="openTool('ai-text')"><i class="fas fa-robot"></i> AI Text Studio</button>
                        <button class="btn btn-green" onclick="openTool('ai-image')"><i class="fas fa-image"></i> AI Image Studio</button>
                    </div>
                </div>
            `;
        }

        function getDynamicContent(moduleId, sectionId) {
            const contents = {
                'base': {
                    'b1': '<ul><li><strong>Giro di Tavolo:</strong> Qual è l\'attività che ruba più tempo?</li><li><strong>Etichette e Filtri:</strong> Organizzazione automatica della inbox</li><li><strong>Gemini in Gmail:</strong> Riassunti e scrittura assistita</li></ul>',
                    'b2': '<ul><li><strong>No-Show:</strong> Riduci le disdette con promemoria automatici</li><li><strong>Vetrina Prenotazioni:</strong> Slot pubblici senza vedere impegni privati</li><li><strong>Stripe:</strong> Pagamento anticipato automatico</li></ul>',
                    'b3': '<ul><li><strong>Meet con Trascrizione:</strong> Automatico</li><li><strong>Da Trascrizione a To-Do:</strong> Con Gemini</li><li><strong>Generazione Documenti:</strong> Con AI</li></ul>',
                    'b4': '<ul><li><strong>Il Muro di Google:</strong> Cosa NON può fare</li><li><strong>App Studio Marini:</strong> La soluzione proprietaria</li><li><strong>Raccolta Lead:</strong> Questionario digitale</li></ul>'
                },
                'mod1': {
                    'm1-1': '<ul><li><strong>Orari di reperibilità:</strong> Configura quando sei disponibile</li><li><strong>Giorni di chiusura:</strong> Festività, ferie</li><li><strong>Tempo di cuscinetto:</strong> Pause tra appuntamenti</li></ul>',
                    'm1-2': '<ul><li><strong>Tipi di Appuntamento:</strong> Crea servizi con durata specifica</li><li><strong>Descrizioni dettagliate:</strong> Cosa aspettarsi</li><li><strong>Campi obbligatori:</strong> Raccogli dati utili</li></ul>',
                    'm1-3': '<ul><li><strong>Account Stripe:</strong> Collegamento a Google Workspace</li><li><strong>Pagamento Totale:</strong> Anticipo completo</li><li><strong>Quota Fissa:</strong> Solo prenotazione (es. 20€)</li></ul>',
                    'm1-4': '<ul><li><strong>Link Pubblico:</strong> Genera la tua vetrina</li><li><strong>WhatsApp Business:</strong> Integra nelle risposte rapide</li><li><strong>Instagram:</strong> Pulsante Prenota</li></ul>'
                },
                'mod2': {
                    'm2-1': '<ul><li><strong>Tono di voce:</strong> Addestra l\'AI al tuo stile</li><li><strong>Modelli Email:</strong> Standard per reclami e preventivi</li><li><strong>Prompt:</strong> Strutture pronte da usare</li></ul>',
                    'm2-2': '<ul><li><strong>Avvio Meet:</strong> Con trascrizione automatica</li><li><strong>Roleplay:</strong> Simulazione in coppie</li><li><strong>Estrazione:</strong> Decisioni dalla trascrizione</li></ul>',
                    'm2-3': '<ul><li><strong>Riassunto:</strong> 4 punti esecutivi</li><li><strong>To-Do List:</strong> Azione, Assegnato, Scadenza</li><li><strong>Follow-up:</strong> Chi deve fare cosa</li></ul>'
                },
                'mod3': {
                    'm3-1': '<ul><li><strong>Estrazione:</strong> Vincoli economici e scadenze</li><li><strong>Semplificazione:</strong> Testo legale in parole semplici</li><li><strong>Analisi:</strong> Qualsiasi PDF</li></ul>',
                    'm3-2': '<ul><li><strong>Manuale Operativo:</strong> Apertura e chiusura negozio</li><li><strong>Procedure:</strong> Step-by-step</li><li><strong>Formattazione:</strong> H1, H2 chiari</li></ul>',
                    'm3-3': '<ul><li><strong>Da Email a Documento:</strong> Estrai dati e impagina</li><li><strong>Scheda Lavoro:</strong> Formato tabella</li><li><strong>Automazione:</strong> Senza copia-incolla</li></ul>'
                }
            };
            return contents[moduleId]?.[sectionId] || '<ul><li>Contenuto del laboratorio...</li></ul>';
        }

        window.showSection = function(sectionId, index) {
            const module = modulesData[currentModule];
            const section = module.sections.find(s => s.id === sectionId);
            
            let contentHtml;
            if (section.type === 'presentation') {
                contentHtml = getDynamicContent(currentModule, sectionId);
            } else {
                contentHtml = renderLabContent(sectionId);
            }
            
            const container = document.getElementById('module-view');
            container.innerHTML = `
                <div class="section-view">
                    <button class="back-btn" onclick="selectModule('${currentModule}')">
                        <i class="fas fa-arrow-left"></i> Torna al modulo
                    </button>
                    <div class="section-header">
                        <span class="badge ${section.type === 'presentation' ? 'badge-cloud' : 'badge-ai'}">
                            ${section.type === 'presentation' ? 'Presentazione' : 'Laboratorio'}
                        </span>
                        <h1>${section.title}</h1>
                    </div>
                    <div class="section-body">
                        ${section.type === 'presentation' ? 
                            '<h2>' + section.title.replace('Presentazione: ', '') + '</h2>' + getDynamicContent(currentModule, sectionId) : 
                            renderLabContent(sectionId)}
                    </div>
                </div>
            `;
            
            syncPresentationSection(index, section.type, section.title, contentHtml, section.time || (section.type === 'presentation' ? 'Lezione' : 'Laboratorio'));
        };

        window.toggleTimer = function() {
            const btn = document.getElementById('timerBtn');
            const display = document.getElementById('timerDisplay');
            
            if (timerRunning) {
                clearInterval(timerInterval);
                timerRunning = false;
                btn.innerHTML = '<i class="fas fa-play"></i> <span id="timerDisplay">'+display.innerText+'</span>';
            } else {
                timerInterval = setInterval(() => {
                    timerSeconds++;
                    const h = Math.floor(timerSeconds / 3600).toString().padStart(2,'0');
                    const m = Math.floor((timerSeconds % 3600) / 60).toString().padStart(2,'0');
                    const s = (timerSeconds % 60).toString().padStart(2,'0');
                    display.innerText = h + ':' + m + ':' + s;
                }, 1000);
                timerRunning = true;
                btn.innerHTML = '<i class="fas fa-pause"></i> <span id="timerDisplay">'+display.innerText+'</span>';
            }
        };

        window.openModal = function(modalId) {
            document.getElementById('modal-' + modalId).style.display = 'flex';
        };

        window.closeModal = function(modalId) {
            document.getElementById('modal-' + modalId).style.display = 'none';
        };

        window.openTool = function(toolId) {
            const container = document.getElementById('module-view');
            
            if (toolId === 'ai-text') {
                container.innerHTML = `
                    <div class="tool-view">
                        <h2><i class="fas fa-robot"></i> AI Text Studio</h2>
                        <textarea id="aiPrompt" class="prompt-area" placeholder="Scrivi il tuo prompt qui..."></textarea>
                        <button class="btn btn-blue" onclick="generateAiText()">
                            <i class="fas fa-paper-plane"></i> Genera
                        </button>
                        <div id="aiOutput" class="response-box"></div>
                    </div>
                `;
            } else if (toolId === 'ai-image') {
                container.innerHTML = `
                    <div class="tool-view">
                        <h2><i class="fas fa-image"></i> AI Image Studio</h2>
                        <textarea id="imagePrompt" class="prompt-area" placeholder="Descrivi l'immagine che vuoi generare..."></textarea>
                        <button class="btn btn-green" onclick="generateImage()">
                            <i class="fas fa-magic"></i> Genera
                        </button>
                        <img id="imageResult" style="display:none; max-width:100%; margin-top:20px; border-radius:16px;">
                    </div>
                `;
            } else if (toolId === 'prompts') {
                container.innerHTML = `
                    <div class="tool-view">
                        <h2><i class="fas fa-copy"></i> Prompt Library</h2>
                        <div class="prompts-grid">
                            <div class="prompt-item" onclick="copyPromptText(this)">
                                <span class="badge badge-ai">Reclamo</span>
                                <code>Agisci come responsabile customer care...</code>
                            </div>
                            <div class="prompt-item" onclick="copyPromptText(this)">
                                <span class="badge badge-ai">Preventivo</span>
                                <code>Prendi questi appunti e trasformali in email professionale...</code>
                            </div>
                            <div class="prompt-item" onclick="copyPromptText(this)">
                                <span class="badge badge-ai">Riassunto</span>
                                <code>Leggi la trascrizione e estrai decisioni...</code>
                            </div>
                            <div class="prompt-item" onclick="copyPromptText(this)">
                                <span class="badge badge-ai">Estrazione PDF</span>
                                <code>Analizza questo PDF e estrai i vincoli economici...</code>
                            </div>
                            <div class="prompt-item" onclick="copyPromptText(this)">
                                <span class="badge badge-ai">Semplificazione</span>
                                <code>Spiega come se fossi un avvocato per un bambino di 10 anni...</code>
                            </div>
                            <div class="prompt-item" onclick="copyPromptText(this)">
                                <span class="badge badge-ai">Procedura</span>
                                <code>Crea un manuale operativo di apertura e chiusura...</code>
                            </div>
                        </div>
                    </div>
                `;
            } else if (toolId === 'risorse') {
                container.innerHTML = `
                    <div class="tool-view">
                        <h2><i class="fas fa-folder"></i> Risorse</h2>
                        <div class="resources-grid">
                            <a href="https://workspace.google.com" target="_blank" class="resource-card">
                                <i class="fab fa-google"></i>
                                <span>Google Workspace</span>
                            </a>
                            <a href="https://stripe.com" target="_blank" class="resource-card">
                                <i class="fab fa-stripe"></i>
                                <span>Stripe</span>
                            </a>
                            <a href="https://workspace.google.com/business/" target="_blank" class="resource-card">
                                <i class="fas fa-star"></i>
                                <span>Workspace Premium</span>
                            </a>
                        </div>
                    </div>
                `;
            } else if (toolId === 'downloads') {
                container.innerHTML = `
                    <div class="tool-view">
                        <h2><i class="fas fa-download"></i> Download Materiali</h2>
                        <div style="margin-top:20px;">
                            <div class="download-item">
                                <i class="fas fa-file-pdf" style="color:#ea4335; font-size:40px;"></i>
                                <div>
                                    <h3>Manuale Corso</h3>
                                    <p>Documento completo con tutte le informazioni</p>
                                </div>
                                <button class="btn btn-outline" onclick="alert('Carica il file PDF dal gestore moduli')">Download</button>
                            </div>
                            <div class="download-item">
                                <i class="fas fa-images" style="color:#4285f4; font-size:40px;"></i>
                                <div>
                                    <h3>Slide Presentazione</h3>
                                    <p>Materiale visivo del corso</p>
                                </div>
                                <button class="btn btn-outline" onclick="alert('Carica le slide dal gestore moduli')">Download</button>
                            </div>
                            <div class="download-item">
                                <i class="fas fa-file-code" style="color:#34a853; font-size:40px;"></i>
                                <div>
                                    <h3>Prompt Templates</h3>
                                    <p>File con tutti i prompt pronti da usare</p>
                                </div>
                                <button class="btn btn-outline" onclick="alert('Carica i template dal gestore moduli')">Download</button>
                            </div>
                        </div>
                        <div style="margin-top:30px; padding:20px; background:#f8f9fa; border-radius:12px;">
                            <p><i class="fas fa-info-circle"></i> Per aggiungere i tuoi file, vai su "Gestisci Moduli" e carica i file nella sezione risorse.</p>
                        </div>
                    </div>
                `;
            }
            
            syncPresentationSection(99, 'tool', 'Strumenti', '<p>Usa gli strumenti indicati dal docente</p>', 'Strumenti');
        };

        window.copyPromptText = function(el) {
            const text = el.querySelector('code').innerText;
            navigator.clipboard.writeText(text);
            el.style.background = '#34a853';
            setTimeout(() => el.style.background = '', 1000);
        };

        window.addParticipant = function(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('new-participant');
                const name = input.value.trim();
                if (name) {
                    const list = document.getElementById('participants-list');
                    list.innerHTML += `<div class="participant-item"><span>${name}</span><button onclick="this.parentElement.remove()">&times;</button></div>`;
                    input.value = '';
                }
            }
        };

        function syncPresentationSection(index, sectionType, sectionTitle, sectionContent, label) {
            if (window.presentationWin && !window.presentationWin.closed) {
                new BroadcastChannel('studio_marini_presentation').postMessage({
                    action: 'showContent',
                    type: sectionType,
                    title: sectionTitle,
                    content: sectionContent,
                    label: label,
                    module: currentModule
                });
            }
        }

        // Initialize
        window.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loadingOverlay').style.display = 'none';
            selectModule('base');
            loadChecklist();
            loadWall();
            renderModulesList();
        });

        window.togglePresenterMode = togglePresenterMode;
        window.startPresentation = startPresentation;
        
        let editingModuleId = null;
        
        function renderModulesList() {
            const list = document.getElementById('modules-list');
            list.innerHTML = '';
            Object.keys(modulesData).forEach(key => {
                const mod = modulesData[key];
                list.innerHTML += `
                    <div class="module-edit-item" style="cursor:pointer; ${editingModuleId === key ? 'background:#e8f0fe;' : ''}" onclick="loadModuleEditor('${key}')">
                        <div>
                            <strong>${mod.title}</strong>
                            <span style="font-size:12px; color:#666">(${mod.duration})</span>
                            <br><span style="font-size:11px; color:#888">${mod.sections?.length || 0} sezioni</span>
                        </div>
                    </div>
                `;
            });
        }
        
        window.loadModuleEditor = function(moduleId) {
            editingModuleId = moduleId;
            const mod = modulesData[moduleId];
            const editor = document.getElementById('module-editor');
            
            let sectionsHtml = '';
            (mod.sections || []).forEach((section, idx) => {
                sectionsHtml += `
                    <div style="background:#f8f9fa; padding:15px; border-radius:12px; margin-bottom:15px;">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                            <strong>Sezione ${idx + 1}</strong>
                            <div>
                                <select onchange="updateSection('${moduleId}', ${idx}, 'type', this.value)" style="padding:5px; border-radius:6px;">
                                    <option value="presentation" ${section.type === 'presentation' ? 'selected' : ''}>Presentazione</option>
                                    <option value="lab" ${section.type === 'lab' ? 'selected' : ''}>Laboratorio</option>
                                </select>
                                <button class="btn btn-outline" style="padding:5px 10px; color:#ea4335;" onclick="deleteSection('${moduleId}', ${idx})"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                        <input type="text" value="${section.title || ''}" placeholder="Titolo sezione" 
                            onchange="updateSection('${moduleId}', ${idx}, 'title', this.value)"
                            style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
                        <input type="text" value="${section.time || ''}" placeholder="Durata (es. Ora 1, Lab 1)" 
                            onchange="updateSection('${moduleId}', ${idx}, 'time', this.value)"
                            style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;">
                        <textarea placeholder="Contenuto HTML della presentazione/laboratorio..." 
                            onchange="updateSection('${moduleId}', ${idx}, 'content', this.value)"
                            style="width:100%; height:100px; padding:10px; border-radius:8px; border:1px solid #ddd;">${section.content || ''}</textarea>
                        <div style="margin-top:10px;">
                            <input type="text" value="${section.link || ''}" placeholder="Link risorsa (es. video, documento)"
                                onchange="updateSection('${moduleId}', ${idx}, 'link', this.value)"
                                style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
                        </div>
                    </div>
                `;
            });
            
            editor.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <input type="text" id="edit-module-title" value="${mod.title}" 
                        onchange="updateModuleMeta('${moduleId}', 'title', this.value)"
                        style="font-size:24px; font-weight:bold; padding:10px; border-radius:8px; border:1px solid #ddd; flex:1; margin-right:20px;">
                    <input type="text" id="edit-module-duration" value="${mod.duration}" 
                        onchange="updateModuleMeta('${moduleId}', 'duration', this.value)"
                        style="width:120px; padding:10px; border-radius:8px; border:1px solid #ddd;">
                </div>
                
                <h3 style="margin-bottom:15px;">Sezioni del Modulo</h3>
                ${sectionsHtml}
                
                <button class="btn btn-outline" onclick="addSection('${moduleId}')" style="width:100%; margin-top:10px;">
                    <i class="fas fa-plus"></i> Aggiungi Sezione
                </button>
                
                <div style="margin-top:30px; padding:20px; background:#fff3cd; border-radius:12px;">
                    <h4><i class="fas fa-exclamation-triangle"></i> Importante</h4>
                    <p style="font-size:14px;">Dopo aver modificato, scorri in alto e seleziona di nuovo il modulo per vedere le modifiche nella dashboard.</p>
                    <button class="btn btn-blue" onclick="closeModal('moduli'); selectModule('${moduleId}');" style="margin-top:10px;">
                        Visualizza Modulo
                    </button>
                </div>
            `;
            
            renderModulesList();
        }
        
        window.updateModuleMeta = function(moduleId, field, value) {
            modulesData[moduleId][field] = value;
            saveModulesToStorage();
        }
        
        window.updateSection = function(moduleId, sectionIdx, field, value) {
            if (!modulesData[moduleId].sections[sectionIdx]) return;
            modulesData[moduleId].sections[sectionIdx][field] = value;
            saveModulesToStorage();
        }
        
        window.addSection = function(moduleId) {
            const newId = moduleId + '-sec' + (modulesData[moduleId].sections.length + 1);
            modulesData[moduleId].sections.push({
                id: newId,
                title: 'Nuova Sezione',
                type: 'presentation',
                time: 'Lezione',
                content: '<ul><li>Inserisci i punti della lezione...</li></ul>'
            });
            saveModulesToStorage();
            loadModuleEditor(moduleId);
        }
        
        window.deleteSection = function(moduleId, sectionIdx) {
            if (confirm('Elimina questa sezione?')) {
                modulesData[moduleId].sections.splice(sectionIdx, 1);
                saveModulesToStorage();
                loadModuleEditor(moduleId);
            }
        }
        
        window.createNewModule = function() {
            const id = 'custom-mod-' + Date.now();
            modulesData[id] = {
                title: 'Nuovo Modulo',
                duration: '2 ore',
                sections: [
                    { id: id + '-1', title: 'Presentazione Iniziale', type: 'presentation', time: 'Ora 1', content: '<ul><li>Contenuto della presentazione...</li></ul>' },
                    { id: id + '-1-lab', title: 'Laboratorio Pratico', type: 'lab', time: 'Ora 2', content: '<ol><li>Primo passo del laboratorio...</li></ol>' }
                ]
            };
            saveModulesToStorage();
            loadModuleEditor(id);
        }
        
        window.deleteModule = function(id) {
            if (confirm('Elimina questo modulo completamente?')) {
                delete modulesData[id];
                renderModulesList();
                saveModulesToStorage();
            }
        };
        
        function saveModulesToStorage() {
            localStorage.setItem('studio_marini_modules', JSON.stringify(modulesData));
        }
        
        function loadModulesFromStorage() {
            const saved = localStorage.getItem('studio_marini_modules');
            if (saved) {
                const parsed = JSON.parse(saved);
                Object.assign(modulesData, parsed);
            }
        }
        
        loadModulesFromStorage();
        
        window.generateQR = function() {
            const url = document.getElementById('qr-url').value;
            if (url) {
                document.getElementById('qr-placeholder').innerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code?size=200x200&data=' + encodeURIComponent(url) + '" />';
            }
        };
    </script>
</body>

</html>
